<!DOCTYPE html>
<html>

<head>
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

  {% include meta.html %}
  {% include plausible.html %}

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">
  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}"
    href="{{ site.baseurl }}/feed.xml" />
  <link rel="icon" href="{{ '/assets/about/fn.png' | relative_url }}" type="image/x-icon">
</head>

<body>
  <nav>
    <ul>
      <li>
        <h2>
          <a href='/about'><img class='nav-avatar' src='/assets/about/fn.png' /></a>
          <a href='/'>Farshad Nayeri</a>
        </h2>
      </li>
      <li><a href="mailto:farshad@igencorp.com">
          <img class='icon' src='/assets/icons/email.svg' />
          <span>Email</span></a></li>
      <li>
        <a href="sms:+16178233876">
          <img class='icon' src='/assets/icons/call.svg' /> <span>Message</span></a>
      </li>
      <li>
        <a href="/docs/resume/Farshad-Nayeri-Resume.pdf" target="_blank">
          <img class='icon' src='/assets/icons/resume.svg' /> <span>Resumé</span></a>
      </li>
      <li>
        <a href="https://www.linkedin.com/in/farshadnayeri/" target="_blank">
          <img class='icon' src='/assets/icons/linkedin.svg' />
          <span>LinkedIn</span>
        </a>
      </li>
      <li style="display: none">
        <a href="/blog/">
          <img class='icon' src='/assets/icons/blog.svg' />
          <span>Blog</span>
        </a>
      </li>
    </ul>
  </nav>

  <div id="main" role="main" class="container">
    {{ content }}
  </div>

  <div class="wrapper-footer">
    <div class="container">
      <footer class="footer">
        <p>@{{ site.time | date: '%Y' }} Farshad Nayeri. All Rights Reserved.</p>
      </footer>
    </div>
  </div>

  {% include analytics.html %}
</body>

</html>
